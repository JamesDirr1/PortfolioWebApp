name: .NET Test

on:
  push:
    branches:
        - main
        - version/*
  pull_request:
    branches:
      - main
      - version/*

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ./PortfolioWebApp.slnx

      - name: Build
        run: dotnet build ./PortfolioWebApp.slnx --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test ./PortfolioWebApp.slnx --no-build --configuration Release --collect:"XPlat Code Coverage" --logger "trx" --results-directory ./tests/TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"tests/TestResults/**/coverage.cobertura.xml" \
            -targetdir:"tests/coverage-report" \
            -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: ./tests/TestResults
          retention-days: 7

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ./tests/coverage-report
          retention-days: 7

      - name: Add coverage summary to workflow job
        if: ${{ always() }}
        run: cat ./tests/coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY