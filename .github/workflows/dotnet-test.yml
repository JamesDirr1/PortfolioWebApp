name: .NET Test

on:
  push:
    branches:
  pull_request:
    branches:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./PortfolioWebApp.slnx

      - name: Build
        run: dotnet build ./PortfolioWebApp.slnx --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test ./PortfolioWebApp.slnx --no-build --configuration Release --logger "trx" --results-directory ./tests/TestResults

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./tests/TestResults
          retention-days: 7